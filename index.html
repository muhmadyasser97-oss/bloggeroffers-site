<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Blogger Offers 🔥</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      background:#081120;
      color:white;
      min-height:100vh;
      padding:20px;
    }

    .container{
      max-width:700px;
      margin:auto;
    }

    .card{
      background:#111c33;
      border-radius:24px;
      padding:24px;
      box-shadow:0 0 30px rgba(0,0,0,.2);
    }

    h1{
      text-align:center;
      font-size:42px;
      margin-bottom:12px;
    }

    .sub{
      text-align:center;
      color:#bfc7d9;
      margin-bottom:25px;
    }

    input{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:#18243f;
      color:white;
      margin-bottom:14px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
    }

    .createBtn{
      background:#ff4f7b;
      color:white;
      margin-bottom:16px;
    }

    .copyBtn{
      background:#22c55e;
      color:white;
      margin-top:10px;
    }

    .result{
      background:#18243f;
      padding:14px;
      border-radius:12px;
      margin-top:10px;
      word-break:break-all;
    }

    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
      margin-top:20px;
    }

    .statBox{
      background:#0a1429;
      border-radius:18px;
      padding:20px;
      text-align:center;
    }

    .statBox h2{
      font-size:36px;
      margin-bottom:8px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
    }

    th,td{
      padding:12px;
      text-align:center;
      border-bottom:1px solid #22314f;
      font-size:14px;
    }

    a{
      color:#4ea1ff;
      text-decoration:none;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="card">

    <h1>🔥 Blogger Offers</h1>

    <p class="sub">
      حول أي لينك لرابط أفلييت احترافي
    </p>

    <input
      type="text"
      id="longUrl"
      placeholder="حط أي لينك أمازون أو متجر هنا"
    />

    <button
      class="createBtn"
      onclick="createShortLink()"
    >
      Create Short Link
    </button>

    <div
      class="result"
      id="result"
    >
      اللينك المختصر هيظهر هنا
    </div>

    <button
      class="copyBtn"
      onclick="copyLastLink()"
    >
      Copy Link
    </button>

    <div class="stats">

      <div class="statBox">
        <h2 id="linksCount">0</h2>
        <p>Links</p>
      </div>

      <div class="statBox">
        <h2 id="clicksCount">0</h2>
        <p>Clicks</p>
      </div>

    </div>

  </div>



  <div class="card" style="margin-top:20px">

    <h2 style="margin-bottom:20px">
      الروابط السابقة
    </h2>

    <table>

      <thead>
        <tr>
          <th>الرابط</th>
          <th>الكليكات</th>
          <th>نسخ</th>
        </tr>
      </thead>

      <tbody id="linksTable">

      </tbody>

    </table>

  </div>

</div>

<script type="module" src="index.js"></script>

</body>
</html>
