<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blogger Offers</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial;
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:550px;
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.1);
      padding:30px;
      border-radius:25px;
      box-shadow:0 0 30px rgba(0,0,0,.3);
    }

    h1{
      text-align:center;
      font-size:42px;
      margin-bottom:30px;
    }

    p.subtitle{
      text-align:center;
      color:#94a3b8;
      margin-bottom:25px;
    }

    input{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      margin-bottom:15px;
      background:#1e293b;
      color:white;
      font-size:15px;
    }

    input::placeholder{
      color:#94a3b8;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,#ff4d6d,#ff758f);
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:.3s;
      margin-top:10px;
    }

    button:hover{
      transform:scale(1.02);
    }

    .secondary-btn{
      background:#22c55e;
    }

    .buttons{
      display:flex;
      gap:10px;
    }

    .stats{
      margin-top:25px;
      display:flex;
      gap:10px;
    }

    .stat-card{
      flex:1;
      background:#111827;
      padding:18px;
      border-radius:18px;
      text-align:center;
    }

    .stat-card h3{
      font-size:24px;
      margin-bottom:5px;
    }

    .stat-card p{
      color:#94a3b8;
    }

    #toast{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#22c55e;
      color:white;
      padding:14px 20px;
      border-radius:12px;
      display:none;
      z-index:999;
    }

    .hidden{
      display:none;
    }

  </style>
</head>
<body>

<div class="container">

  <h1>🔥 Blogger Offers</h1>

  <p class="subtitle">
    حول أي لينك أمازون لأفلييت لينك احترافي
  </p>

  <div id="authBox">

    <input type="email" id="email" placeholder="الايميل">

    <input type="password" id="password" placeholder="الباسورد">

    <div class="buttons">
      <button id="signupBtn">إنشاء حساب</button>
      <button id="loginBtn">تسجيل دخول</button>
    </div>

  </div>

  <div id="mainBox" class="hidden">

    <input
      type="text"
      id="urlInput"
      placeholder="حط أي لينك أمازون أو أي موقع هنا"
    >

    <button id="createBtn">
      Create Short Link
    </button>

    <input
      type="text"
      id="result"
      readonly
      placeholder="اللينك المختصر هيظهر هنا"
    >

    <button id="copyBtn" class="secondary-btn">
      Copy Link
    </button>

    <div class="stats">

      <div class="stat-card">
        <h3 id="linksCount">0</h3>
        <p>Links</p>
      </div>

      <div class="stat-card">
        <h3 id="clicksCount">0</h3>
        <p>Clicks</p>
      </div>

    </div>

  </div>

</div>

<div id="toast">
  تم نسخ اللينك 🔥
</div>

<script type="module" src="./index.js"></script>

</body>
</html>
